<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:#050505;
overflow:hidden;
}

/* Animated background */
body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:
radial-gradient(circle,#ff7b00 1px,transparent 1px);
background-size:40px 40px;
opacity:.15;
animation:bgMove 30s linear infinite;
}

@keyframes bgMove{
from{
transform:translate(0,0);
}
to{
transform:translate(-100px,-100px);
}
}

/* Card */
.container{
position:relative;
width:340px;
padding:45px 25px;
text-align:center;
border-radius:30px;
background:rgba(20,20,20,.9);
border:2px solid #ff8c00;

box-shadow:
0 0 20px #ff7b00,
0 0 50px #ff7b00,
0 0 100px rgba(255,123,0,.7);

animation:
float 3s ease-in-out infinite,
glow 2s alternate infinite;
}

@keyframes float{
50%{
transform:translateY(-12px);
}
}

@keyframes glow{
from{
box-shadow:
0 0 20px #ff7b00,
0 0 50px #ff7b00;
}
to{
box-shadow:
0 0 40px #ff7b00,
0 0 80px #ff7b00,
0 0 150px rgba(255,123,0,.9);
}
}

/* Profile */
.profile{
width:130px;
height:130px;
border-radius:50%;
object-fit:cover;
border:4px solid #ffae42;
margin-bottom:20px;

box-shadow:
0 0 20px #ffae42,
0 0 50px #ffae42;
}

h1{
color:#ff9a00;
font-size:34px;
letter-spacing:2px;
text-shadow:
0 0 15px #ff9a00,
0 0 35px #ff9a00;
margin-bottom:15px;
}

p{
color:#ddd;
line-height:1.8;
margin-bottom:30px;
}

/* Animated Button */
.btn{
position:relative;
display:inline-block;
padding:18px 45px;
border-radius:60px;
background:linear-gradient(90deg,#ff5e00,#ff9500,#ffb300);
background-size:300% 300%;
color:white;
font-size:18px;
font-weight:bold;
text-decoration:none;
overflow:hidden;

animation:
gradientMove 3s linear infinite,
pulse 1.5s infinite;

box-shadow:
0 0 20px #ff7b00,
0 0 40px #ff7b00,
0 0 80px #ff7b00;
}

.btn::before{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:rgba(255,255,255,.35);
transform:skewX(-30deg);
animation:shine 2s infinite;
}

@keyframes shine{
100%{
left:150%;
}
}

@keyframes gradientMove{
0%{
background-position:0% 50%;
}
100%{
background-position:100% 50%;
}
}

@keyframes pulse{
50%{
transform:scale(1.08);
}
}
